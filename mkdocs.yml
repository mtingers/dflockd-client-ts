site_name: dflockd-client (TypeScript)
site_url: https://mtingers.github.io/dflockd-client-ts/
site_description: A TypeScript client for the dflockd
repo_url: https://github.com/mtingers/dflockd-client-ts
repo_name: mtingers/dflockd-client-ts

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: slate
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: slate
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started/index.md
  - API Reference:
    - DistributedLock: api/lock.md
    - DistributedSemaphore: api/semaphore.md
    - Signals (Pub/Sub): api/signals.md
    - Low-level Functions: api/low-level.md
    - Stats: api/stats.md
    - Error Handling: api/errors.md
  - Guides:
    - TLS & Authentication: guides/security.md
    - Sharding: guides/sharding.md
  - Changelog: changelog.md

extra_css:
  - stylesheets/extra.css
